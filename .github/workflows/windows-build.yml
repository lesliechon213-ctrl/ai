name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - windows-2022
        node:
          - "20"
          - "22"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      - name: Check syntax
        run: npm run check

      - name: Check RP compatibility
        run: npm run compat

      - name: Check no API source
        run: npm run scan:no-api

      - name: Smoke test
        run: npm run smoke

      - name: Package Windows app
        run: npm run package:win

      - name: Check packaged app
        run: npm run check:package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-super-employee-developer-${{ matrix.os }}-node${{ matrix.node }}
          path: dist/**
